name: static-check
on:
  push:
  pull_request:
jobs:
  static-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node --check config.js
      - run: node --check app.js
      - run: node tests/static-check.mjs
