<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>CodeMoji - קוד קטן שנפתח עם הסימן שלך</title>
  <meta name="description" content="CodeMoji - הודעה קטנה לחברים סקרנים שנפתחת עם סימן אישי במכשיר." />
  <meta name="theme-color" content="#fff6d8" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="CodeMoji" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="manifest" href="manifest.webmanifest?v=magic-state-machine-20260512" />
  <link rel="icon" href="assets/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="assets/icon.svg" />
  <link rel="stylesheet" href="styles.css?v=magic-state-machine-20260512" />
  <script defer src="config.js?v=magic-state-machine-20260512"></script>
  <script defer src="app.js?v=magic-state-machine-20260512"></script>
</head>
<body>
  <div class="ambient" aria-hidden="true">
    <span class="bubble bubble-a"></span>
    <span class="bubble bubble-b"></span>
    <span class="bubble bubble-c"></span>
  </div>

  <main id="mainApp" class="app-shell">
    <section id="appCard" class="codemoji-card glass" aria-live="polite">
      <header class="card-head">
        <div class="brand-line">
          <img src="assets/icon.svg" class="logo" alt="CodeMoji" />
          <div>
            <p class="eyebrow">Magic Edition</p>
            <h1>CodeMoji</h1>
          </div>
        </div>
        <button id="settingsBtn" class="mini-btn" type="button" aria-label="איפוס סימן">⋯</button>
      </header>

      <div class="card-copy">
        <h2 id="cardTitle">קוד קטן שנפתח עם הסימן שלך</h2>
        <p id="cardSubtitle">כתוב/י, צייר/י, שלח/י.</p>
      </div>

      <div id="dynamicArea" class="dynamic-area"></div>

      <button id="primaryBtn" class="primary-btn wide" type="button">התחלה</button>

      <div id="secondaryRow" class="secondary-row"></div>

      <div id="statusLine" class="status-line"></div>
    </section>

    <p class="footer-note">
      פתק קטן. מחווה אחת. רגע של קסם.
    </p>
  </main>

  <template id="patternTemplate">
    <div class="pattern-wrap">
      <div class="pattern-grid" data-pattern-grid></div>
      <div class="pattern-readout" data-pattern-readout>בחר/י לפחות 4 נקודות</div>
    </div>
  </template>
</body>
</html>
